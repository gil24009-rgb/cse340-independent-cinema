services:
  - type: web
    name: cse340-independent-cinema
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd app && pnpm install --frozen-lockfile && cd .. && node app/scripts/initialize-database.js
    startCommand: cd app && pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cse340-independent-cinema-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: cse340-independent-cinema-db
    plan: free
    region: oregon
    databaseName: independent_cinema
    user: cinema_app
